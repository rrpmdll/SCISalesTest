services:
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: scisalestest-sqlserver
    environment:
      - ACCEPT_EULA=Y
      - MSSQL_SA_PASSWORD=YourStr0ngP@ssword!
    ports:
      - "1433:1433"
    volumes:
      - sqlserver_data:/var/opt/mssql

  webapi:
    build:
      context: .
      dockerfile: webapi/WebApi/Dockerfile
    container_name: scisalestest-webapi
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ConnectionStrings__DefaultConnection=Server=sqlserver;Database=SCISalesTestDb;User Id=sa;Password=YourStr0ngP@ssword!;TrustServerCertificate=True;
    ports:
      - "5000:8080"
    depends_on:
      - sqlserver

  webapp:
    build:
      context: .
      dockerfile: webapp/WebApp/Dockerfile
    container_name: scisalestest-webapp
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - WebApi__BaseAddress=http://webapi:8080
    ports:
      - "5002:8080"
    depends_on:
      - webapi

volumes:
  sqlserver_data:
